name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: firebase-hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (next export)
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      # Deploy via the Firebase CLI directly (instead of action-hosting-deploy)
      # so the release is idempotent. The CLI occasionally retries the
      # non-idempotent release POST after a "premature close" — by then the first
      # POST already made the version live, so the retry returns
      # 400 "is the current active version". That is a success, not a failure.
      - name: Deploy to Firebase Hosting (live)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PICKNGO_9A4F1 }}
        run: |
          set -euo pipefail

          CRED_FILE="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$CRED_FILE"
          export GOOGLE_APPLICATION_CREDENTIALS="$CRED_FILE"
          trap 'rm -f "$CRED_FILE"' EXIT

          set +e
          DEPLOY_LOG="$(npx --yes firebase-tools deploy \
            --only hosting \
            --project pickngo-9a4f1 \
            --non-interactive 2>&1)"
          STATUS=$?
          set -e

          echo "$DEPLOY_LOG"

          if [ "$STATUS" -ne 0 ]; then
            if echo "$DEPLOY_LOG" | grep -q "is the current active version"; then
              echo "::notice::Release retried after the version was already live (idempotent race). Treating as success."
            else
              exit "$STATUS"
            fi
          fi
